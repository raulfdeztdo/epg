name: Daily Grab
on:
  schedule:
    - cron: "0 0 * * *"  # Ejecuta a las 00:00 UTC todos los días
jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16  # Usa la versión de Node.js que necesites

      - name: Install dependencies
        run: npm install

      - name: Run grab for Movistar+
        run: npm run grab --- --site=movistarplus.es

      - name: Commit and push changes
        run: |
          git config --global user.name "Raúl Fernández"
          git config --global user.email "raulfdeztdo@gmail.com"
          git add .
          git commit -m "Actualización EPG"
          git push